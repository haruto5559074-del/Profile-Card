<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card — Muhammad Umer</title>
<style>
  :root {
    --ink: #22262A;
    --ink-soft: #565F5E;
    --paper: #F6F5F1;
    --card: #FFFFFF;
    --pine: #2F4B44;
    --pine-deep: #1D302B;
    --amber: #B9803C;
    --line: #E4E1D8;
    --shadow: rgba(29, 48, 43, 0.14);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(47,75,68,0.06) 0, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(185,128,60,0.07) 0, transparent 45%);
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 32px 16px;
  }

  .card {
    width: 100%;
    max-width: 500px;
    min-width: 350px;
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 20px 40px -20px var(--shadow), 0 2px 8px rgba(29,48,43,0.06);
    border: 1px solid var(--line);
    overflow: hidden;
  }

  /* ---- HEADER ---- */
  .card > header {
    position: relative;
    padding: 40px 32px 28px;
    text-align: center;
    background: linear-gradient(180deg, #EEF1EC 0%, var(--card) 100%);
    border-bottom: 1px solid var(--line);
  }

  .avatar {
    width: 96px;
    height: 96px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: var(--pine);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 16px -6px var(--shadow), 0 0 0 4px var(--card), 0 0 0 5px var(--line);
  }

  .avatar svg { width: 56px; height: 56px; }

  .card > header h1 {
    margin: 0 0 4px;
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    font-size: 1.7rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--pine-deep);
  }

  .role {
    margin: 0;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--amber);
  }

  /* ---- SECTION (bio) ---- */
  .card > section {
    padding: 26px 32px 8px;
  }

  .bio {
    margin: 0;
    font-size: 0.98rem;
    line-height: 1.6;
    color: var(--ink-soft);
    text-align: center;
  }

  /* ---- FOOTER (social links) ---- */
  .card > footer {
    padding: 22px 24px 30px;
  }

  .social-list {
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 0;
    padding: 0;
  }

  .social-list a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    border-radius: 999px;
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--ink);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
  }

  .social-list a:hover {
    background: var(--pine);
    border-color: var(--pine);
    color: #fff;
    transform: translateY(-2px);
  }

  .social-list svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .social-list a:hover svg { fill: #fff; }
  .social-list svg { fill: var(--pine); transition: fill 0.18s ease; }

  /* ---- Responsive: keep it clean from 350px up to 500px ---- */
  @media (max-width: 380px) {
    .card > header { padding: 32px 20px 22px; }
    .card > section { padding: 20px 20px 4px; }
    .card > footer { padding: 18px 12px 24px; }
    .social-list { flex-wrap: wrap; gap: 10px; }
    .social-list a { padding: 8px 12px; font-size: 0.8rem; }
    .card > header h1 { font-size: 1.45rem; }
  }
</style>
</head>
<body>

      <div class="avatar" aria-hidden="true">
